<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="680" viewBox="0 0 1050 680" font-family="Helvetica, Arial, sans-serif">
  <rect width="1050" height="680" fill="#0f172a"/>
  <text x="525" y="28" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — OSPF Multi-Area (Lab 11)</text>

  <!-- Area boundaries -->
  <rect x="40" y="90" width="320" height="260" rx="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="200" y="80" fill="#f59e0b" font-size="13" font-weight="bold" text-anchor="middle">AREA 1 — HQ LAN</text>

  <rect x="405" y="105" width="240" height="80" rx="14" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="525" y="95" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">AREA 0 — BACKBONE</text>

  <rect x="690" y="90" width="320" height="260" rx="14" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="850" y="80" fill="#22d3ee" font-size="13" font-weight="bold" text-anchor="middle">AREA 2 — BRANCH LAN</text>

  <!-- HQ-R1 -->
  <rect x="150" y="120" width="180" height="90" rx="8" fill="#1e293b" stroke="#facc15" stroke-width="2.5"/>
  <text x="240" y="143" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">HQ-R1 (ABR)</text>
  <text x="240" y="159" fill="#94a3b8" font-size="8.5" text-anchor="middle">router-id 1.1.1.1</text>
  <text x="240" y="171" fill="#94a3b8" font-size="8.5" text-anchor="middle">Gi0/0.10, .20 → Area 1</text>
  <text x="240" y="183" fill="#94a3b8" font-size="8.5" text-anchor="middle">Gi0/1, Gi0/2 → Area 0</text>

  <!-- BRANCH-R1 -->
  <rect x="700" y="120" width="180" height="90" rx="8" fill="#1e293b" stroke="#facc15" stroke-width="2.5"/>
  <text x="790" y="143" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">BRANCH-R1 (ABR)</text>
  <text x="790" y="159" fill="#94a3b8" font-size="8.5" text-anchor="middle">router-id 2.2.2.2</text>
  <text x="790" y="171" fill="#94a3b8" font-size="8.5" text-anchor="middle">Gi0/0 → Area 2</text>
  <text x="790" y="183" fill="#94a3b8" font-size="8.5" text-anchor="middle">Gi0/1, Gi0/2 → Area 0</text>

  <!-- Links -->
  <line x1="330" y1="145" x2="700" y2="145" stroke="#22c55e" stroke-width="3.5"/>
  <text x="515" y="135" fill="#22c55e" font-size="10" font-weight="bold" text-anchor="middle">Gi0/1 — 192.168.100.0/30 — cost 1</text>

  <line x1="330" y1="170" x2="700" y2="170" stroke="#f87171" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="515" y="192" fill="#f87171" font-size="10" font-weight="bold" text-anchor="middle">Gi0/2 — 192.168.101.0/30 — cost 50</text>

  <!-- HQ switches -->
  <rect x="60" y="250" width="140" height="70" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="130" y="272" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="130" y="286" fill="#a78bfa" font-size="8.5" text-anchor="middle">ROOT BRIDGE</text>
  <text x="130" y="298" fill="#94a3b8" font-size="8.5" text-anchor="middle">Vlan99: .99.1</text>
  <line x1="240" y1="210" x2="160" y2="250" stroke="#facc15" stroke-width="2"/>

  <rect x="230" y="250" width="120" height="70" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="290" y="272" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">HQ-SW2</text>
  <text x="290" y="286" fill="#94a3b8" font-size="8.5" text-anchor="middle">Vlan99: .99.2</text>
  <line x1="200" y1="285" x2="230" y2="285" stroke="#22c55e" stroke-width="4"/>

  <!-- Branch switch -->
  <rect x="740" y="250" width="150" height="70" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="815" y="272" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">BRANCH-SW1</text>
  <text x="815" y="286" fill="#94a3b8" font-size="8.5" text-anchor="middle">Vlan30, Vlan99</text>
  <text x="815" y="298" fill="#94a3b8" font-size="8.5" text-anchor="middle">Vlan99: .199.1</text>
  <line x1="790" y1="210" x2="815" y2="250" stroke="#facc15" stroke-width="2"/>

  <!-- HQ PCs -->
  <g><rect x="30" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/><text x="62" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC1 HR</text><text x="62" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">10.2/29</text></g>
  <g><rect x="105" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/><text x="137" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC2 HR</text><text x="137" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">10.3/29</text></g>
  <g><rect x="180" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/><text x="212" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC3 Sales</text><text x="212" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">20.2/28</text></g>
  <line x1="62" y1="360" x2="110" y2="320" stroke="#64748b" stroke-width="1"/>
  <line x1="137" y1="360" x2="120" y2="320" stroke="#64748b" stroke-width="1"/>
  <line x1="212" y1="360" x2="270" y2="320" stroke="#64748b" stroke-width="1"/>

  <g><rect x="255" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/><text x="287" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC5 HR</text><text x="287" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">10.4/29</text></g>
  <g><rect x="330" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/><text x="362" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC6 Sales</text><text x="362" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">20.3/28</text></g>
  <line x1="287" y1="360" x2="280" y2="320" stroke="#64748b" stroke-width="1"/>
  <line x1="362" y1="360" x2="300" y2="320" stroke="#64748b" stroke-width="1"/>

  <!-- Branch PCs -->
  <g><rect x="760" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#a3e635" stroke-width="1.5"/><text x="792" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC7</text><text x="792" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">30.2/29</text></g>
  <g><rect x="835" y="360" width="65" height="48" rx="5" fill="#1e293b" stroke="#a3e635" stroke-width="1.5"/><text x="867" y="380" fill="#e2e8f0" font-size="9" text-anchor="middle">PC8</text><text x="867" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">30.3/29</text></g>
  <line x1="792" y1="360" x2="805" y2="320" stroke="#64748b" stroke-width="1"/>
  <line x1="867" y1="360" x2="825" y2="320" stroke="#64748b" stroke-width="1"/>

  <!-- Legend -->
  <rect x="20" y="450" width="1010" height="210" rx="10" fill="#16283f" stroke="#334155" stroke-width="1"/>
  <text x="525" y="480" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">Key Multi-Area Concepts</text>
  <text x="525" y="510" fill="#94a3b8" font-size="11.5" text-anchor="middle">HQ-R1 and BRANCH-R1 are both Area Border Routers (ABRs) — each touches Area 0 AND one non-backbone area</text>
  <text x="525" y="533" fill="#94a3b8" font-size="11.5" text-anchor="middle">Area 0 (backbone) MUST connect every other area — Areas 1 and 2 never connect directly to each other</text>
  <text x="525" y="556" fill="#94a3b8" font-size="11.5" text-anchor="middle">Routes learned from a DIFFERENT area show as "O IA" (inter-area) in the routing table — not plain "O"</text>
  <text x="525" y="579" fill="#94a3b8" font-size="11.5" text-anchor="middle">A local link flap inside Area 1 no longer forces Area 2 to recalculate its entire routing table</text>
  <text x="525" y="602" fill="#94a3b8" font-size="11.5" text-anchor="middle">Management VLANs (both sites) remain unrouted — same security boundary since Lab 07</text>
  <text x="525" y="625" fill="#94a3b8" font-size="11.5" text-anchor="middle">Floating static (AD 115) still present as absolute last resort if OSPF itself fails entirely</text>
</svg>
