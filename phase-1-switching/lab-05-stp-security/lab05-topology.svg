<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="860" height="500" fill="#0f172a"/>
  <text x="430" y="30" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">SomNet Solutions — STP Security (Lab 05)</text>

  <!-- SW1 -->
  <rect x="130" y="80" width="200" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="230" y="110" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW1</text>
  <text x="230" y="128" fill="#a78bfa" font-size="11" text-anchor="middle">ROOT BRIDGE</text>
  <text x="230" y="144" fill="#f87171" font-size="10" text-anchor="middle">Root Guard on Gi0/1, Gi0/2</text>

  <!-- SW2 -->
  <rect x="530" y="80" width="200" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="630" y="110" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">HQ-SW2</text>
  <text x="630" y="128" fill="#94a3b8" font-size="11" text-anchor="middle">non-root</text>

  <line x1="330" y1="105" x2="530" y2="105" stroke="#22c55e" stroke-width="3"/>
  <line x1="330" y1="140" x2="530" y2="140" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- legit PC with port security -->
  <g>
    <rect x="70" y="250" width="90" height="55" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="115" y="272" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">PC1</text>
    <text x="115" y="288" fill="#22c55e" font-size="10" text-anchor="middle">🔒 port-security</text>
  </g>
  <line x1="115" y1="250" x2="180" y2="160" stroke="#64748b" stroke-width="1.5"/>

  <!-- rogue device attempt -->
  <g>
    <rect x="220" y="250" width="100" height="55" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="270" y="272" fill="#f87171" font-size="12" font-weight="bold" text-anchor="middle">Unknown laptop</text>
    <text x="270" y="288" fill="#f87171" font-size="10" text-anchor="middle">✕ err-disabled</text>
  </g>
  <line x1="270" y1="250" x2="230" y2="160" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- rogue switch -->
  <g>
    <rect x="360" y="250" width="110" height="55" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="415" y="272" fill="#f87171" font-size="12" font-weight="bold" text-anchor="middle">Rogue Switch</text>
    <text x="415" y="288" fill="#f87171" font-size="10" text-anchor="middle">✕ BPDU Guard trips</text>
  </g>
  <line x1="415" y1="250" x2="280" y2="160" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- normal PCs on SW2 -->
  <g>
    <rect x="580" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="620" y="272" fill="#e2e8f0" font-size="12" text-anchor="middle">PC5</text>
    <text x="620" y="288" fill="#22c55e" font-size="10" text-anchor="middle">🔒</text>
  </g>
  <g>
    <rect x="670" y="250" width="80" height="55" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="710" y="272" fill="#e2e8f0" font-size="12" text-anchor="middle">PC6</text>
    <text x="710" y="288" fill="#22c55e" font-size="10" text-anchor="middle">🔒</text>
  </g>
  <line x1="620" y1="250" x2="600" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <line x1="710" y1="250" x2="660" y2="160" stroke="#64748b" stroke-width="1.5"/>

  <text x="430" y="380" fill="#64748b" font-size="12" text-anchor="middle">Port Security = limits which MAC addresses may use a PC port</text>
  <text x="430" y="400" fill="#64748b" font-size="12" text-anchor="middle">BPDU Guard = shuts down a port instantly if it receives a BPDU (a switch shouldn't be there)</text>
  <text x="430" y="420" fill="#64748b" font-size="12" text-anchor="middle">Root Guard = prevents a downstream switch from ever becoming root, even accidentally</text>
</svg>
